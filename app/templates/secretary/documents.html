{% extends "base.html" %}
{% block title %}文档查看 - 入党文档管理系统{% endblock %}

{% block content %}
<div class="documents-page">
    <div class="page-header">
        <h1 class="page-title">文档审核</h1>
        <p class="page-subtitle">审核申请人提交的入党文档（仅限需要书记审核的步骤）</p>
    </div>

    <!-- 筛选区域 -->
    <div class="card filter-card">
        <div class="card-body">
            <div class="filter-row">
                <div class="filter-group">
                    <label class="filter-label">搜索</label>
                    <input type="text" id="searchInput" class="form-control" placeholder="输入申请人姓名或文档名搜索...">
                </div>
                <div class="filter-group">
                    <label class="filter-label">文档类型</label>
                    <select id="typeFilter" class="form-control">
                        <option value="">全部类型</option>
                        <option value="application_letter">入党申请书</option>
                        <option value="thought_report">思想汇报</option>
                        <option value="autobiography">自传</option>
                        <option value="other">其他</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="filter-label">审核状态</label>
                    <select id="statusFilter" class="form-control">
                        <option value="">全部状态</option>
                        <option value="pending">待审核</option>
                        <option value="approved">已通过</option>
                        <option value="rejected">已驳回</option>
                    </select>
                </div>
                <!-- 操作按钮 -->
                <div class="filter-actions">
                    <button type="button" class="btn btn-primary" onclick="loadDocuments()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                        搜索
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="resetFilters()">
                        重置
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 文档列表 -->
    <div class="card card-decorated">
        <div class="card-header">
            <h3 class="card-title">待审核文档</h3>
            <span class="card-count">共 <span id="totalCount">0</span> 份</span>
        </div>
        <div class="card-body">
            <div id="documentsList" class="documents-list">
                <!-- 文档列表将通过JavaScript动态加载 -->
            </div>
        </div>
    </div>
</div>

<style>
/* 文档审核页面样式 */
.documents-page {
    max-width: 1200px;
    margin: 0 auto;
}

.page-header {
    margin-bottom: var(--spacing-xl);
}

.page-title {
    font-family: var(--font-display);
    font-size: 2rem;
    font-weight: 600;
    color: var(--color-primary-dark);
    margin-bottom: var(--spacing-xs);
}

.page-subtitle {
    color: var(--color-text-secondary);
    font-size: 1rem;
}

/* 文档退回原因输入表单 */
.doc-reject-form {
    display: flex;
    gap: 4px;
    align-items: center;
    width: 100%;
    padding-top: var(--spacing-xs);
}

.doc-reject-form .form-control-sm {
    flex: 1;
    min-width: 150px;
    padding: 4px 8px;
    font-size: 0.8125rem;
}

/* 筛选卡片 */
.filter-card {
    margin-bottom: var(--spacing-lg);
}

.filter-card .card-body {
    padding: var(--spacing-lg);
}

.filter-row {
    display: flex;
    gap: var(--spacing-lg);
    flex-wrap: wrap;
}

.filter-group {
    flex: 1;
    min-width: 180px;
}

.filter-label {
    display: block;
    margin-bottom: var(--spacing-sm);
    font-weight: 500;
    color: var(--color-text-secondary);
    font-size: 0.875rem;
}

.filter-actions {
    display: flex;
    gap: var(--spacing-sm);
    align-items: flex-end;
    padding-top: 24px;
}

.filter-actions .btn {
    display: inline-flex;
    align-items: center;
    gap: var(--spacing-xs);
}

/* 卡片头部 */
.card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.card-count {
    font-size: 0.875rem;
    color: var(--color-text-secondary);
}

/* 文档列表 */
.documents-list {
    min-height: 200px;
}

.document-card {
    display: flex;
    align-items: center;
    padding: var(--spacing-md);
    border: 1px solid var(--color-border-light);
    border-radius: var(--radius-md);
    margin-bottom: var(--spacing-md);
    transition: all var(--transition-fast);
    flex-wrap: wrap;
}

.document-card:hover {
    border-color: var(--color-primary-light);
    box-shadow: var(--shadow-sm);
}

.document-icon {
    width: 48px;
    height: 48px;
    border-radius: var(--radius-md);
    background: var(--color-bg-light);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--color-primary);
    margin-right: var(--spacing-md);
    flex-shrink: 0;
}

.document-icon svg {
    width: 24px;
    height: 24px;
}

.document-info {
    flex: 1;
}

.document-name {
    font-weight: 600;
    color: var(--color-text-primary);
    margin-bottom: var(--spacing-xs);
}

.document-meta {
    display: flex;
    gap: var(--spacing-md);
    font-size: 0.8125rem;
    color: var(--color-text-secondary);
}

.document-actions {
    display: flex;
    gap: var(--spacing-sm);
}

/* 状态徽章 */
.status-badge {
    display: inline-block;
    padding: var(--spacing-xs) var(--spacing-sm);
    border-radius: var(--radius-sm);
    font-size: 0.75rem;
    font-weight: 500;
}

.status-pending {
    background: rgba(218, 165, 32, 0.1);
    color: var(--color-warning);
}

.status-approved {
    background: rgba(46, 139, 87, 0.1);
    color: var(--color-success);
}

.status-rejected {
    background: rgba(220, 20, 60, 0.1);
    color: var(--color-error);
}

/* 空状态 */
.empty-state {
    text-align: center;
    padding: var(--spacing-xxl);
    color: var(--color-text-muted);
}

.empty-icon {
    width: 64px;
    height: 64px;
    margin: 0 auto var(--spacing-md);
    opacity: 0.5;
}

.empty-icon svg {
    width: 100%;
    height: 100%;
}

/* 响应式设计 */
@media (max-width: 768px) {
    .filter-row {
        flex-direction: column;
    }

    .filter-group {
        width: 100%;
    }

    .document-card {
        flex-direction: column;
        align-items: flex-start;
    }

    .document-actions {
        width: 100%;
        margin-top: var(--spacing-sm);
    }
}
</style>

<script>
// 加载文档列表
async function loadDocuments() {
    const search = document.getElementById('searchInput').value;
    const type = document.getElementById('typeFilter').value;
    const status = document.getElementById('statusFilter').value;

    try {
        const response = await fetch(`/secretary/api/documents?search=${encodeURIComponent(search)}&type=${type}&status=${status}`);
        const data = await response.json();

        const list = document.getElementById('documentsList');
        const countEl = document.getElementById('totalCount');

        if (data.documents && data.documents.length > 0) {
            countEl.textContent = data.documents.length;
            list.innerHTML = data.documents.map(doc => {
                // Determine if secretary can review this document
                var canReview = doc.secretary_role === 'approver' && doc.status === 'pending';
                var reviewButtons = '';
                if (canReview) {
                    reviewButtons = `
                        <div class="document-actions">
                            <button class="btn btn-sm btn-success" onclick="reviewDocument(${doc.id}, 'approve')">通过</button>
                            <button class="btn btn-sm btn-danger" onclick="toggleRejectForm(${doc.id})">退回</button>
                        </div>
                        <div class="doc-reject-form" id="reject-form-${doc.id}" style="display:none;">
                            <input type="text" id="reject-comment-${doc.id}" class="form-control form-control-sm"
                                   placeholder="输入退回原因...">
                            <button class="btn btn-sm btn-danger" onclick="reviewDocument(${doc.id}, 'reject')">确认退回</button>
                            <button class="btn btn-sm btn-secondary" onclick="hideRejectForm(${doc.id})">取消</button>
                        </div>`;
                }

                // Build preview button for PDF/image files
                var previewBtn = '';
                if (doc.filename && /\.(pdf|jpg|jpeg|png)$/i.test(doc.filename)) {
                    var safeName = escapeHtml(doc.original_filename || doc.filename).replace(/'/g, "\\'");
                    previewBtn = '<a href="#" onclick="openPreview(' + doc.id + ', \'' + safeName + '\', \'' + '/secretary/api/documents/' + doc.id + '/preview' + '\', \'' + '/admin/documents/' + doc.id + '/download' + '\'); return false;" class="btn btn-sm btn-outline" style="margin-right:4px;">预览</a>';
                }

                return `
                <div class="document-card" id="doc-card-${doc.id}">
                    <div class="document-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                    </div>
                    <div class="document-info">
                        <div class="document-name">${doc.filename}</div>
                        <div class="document-meta">
                                <span>申请人: ${doc.applicant_name || '未知'}</span>
                                <span>${doc.uploaded_at || ''}</span>
                                <span class="status-badge status-${getStatusClass(doc.status)}">${getStatusText(doc.status)}</span>
                            </div>
                    </div>
                    ${previewBtn}
                    ${reviewButtons}
                </div>`;
            }).join('');
        } else {
            countEl.textContent = '0';
            list.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                    </div>
                    <p>暂无待审核文档</p>
                </div>
            `;
        }
    } catch (error) {
        console.error('加载文档列表失败:', error);
    }
}

function getStatusText(status) {
    const statusMap = {
        'pending': '待审核',
        'secretary_approved': '书记已通过',
        'admin_approved': '最终通过',
        'secretary_rejected': '已驳回',
        'admin_rejected': '管理员已驳回'
    };
    return statusMap[status] || status;
}

function getStatusClass(status) {
    if (status === 'pending') return 'pending';
    if (status === 'secretary_approved' || status === 'admin_approved') return 'approved';
    if (status === 'secretary_rejected' || status === 'admin_rejected') return 'rejected';
    return status;
}

function viewDocument(id) {
    // Navigate to the document's application detail page for full review context
    // The document review is now available directly on this page via review buttons
    alert('请直接在当前页面使用审核按钮进行文档审核。');
}

// 弃用提示已移除 - 文档审核功能已恢复
// 书记可以对 two_level 步骤的单个文档进行通过/退回操作

/**
 * 切换退回原因输入框的显示
 */
function toggleRejectForm(docId) {
    var form = document.getElementById('reject-form-' + docId);
    if (form) {
        form.style.display = form.style.display === 'none' ? 'flex' : 'none';
        if (form.style.display === 'flex') {
            document.getElementById('reject-comment-' + docId).focus();
        }
    }
}

/**
 * 隐藏退回原因输入框
 */
function hideRejectForm(docId) {
    var form = document.getElementById('reject-form-' + docId);
    if (form) {
        form.style.display = 'none';
        document.getElementById('reject-comment-' + docId).value = '';
    }
}

/**
 * 审核单个文档（通过或退回）
 * @param {number} docId - 文档ID
 * @param {string} action - 'approve' 或 'reject'
 */
function reviewDocument(docId, action) {
    var comment = '';
    if (action === 'reject') {
        var commentEl = document.getElementById('reject-comment-' + docId);
        comment = commentEl ? commentEl.value : '';
        if (!comment.trim()) {
            alert('请输入退回原因');
            return;
        }
    } else {
        if (!confirm('确认通过该文档？')) return;
    }

    // 禁用该文档卡片中的所有按钮防止重复点击
    var docCard = document.getElementById('doc-card-' + docId);
    var btns = docCard ? docCard.querySelectorAll('button') : [];
    btns.forEach(function(b) { b.disabled = true; });

    fetch('/secretary/api/documents/' + docId + '/review', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({action: action, comment: comment})
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
        if (data.success) {
            // 刷新页面以更新文档列表状态
            location.reload();
        } else {
            alert(data.message || '操作失败');
            btns.forEach(function(b) { b.disabled = false; });
        }
    })
    .catch(function(error) {
        alert('网络错误，请重试');
        btns.forEach(function(b) { b.disabled = false; });
    });
}

// 初始化加载
document.addEventListener('DOMContentLoaded', loadDocuments);

// 绑定筛选事件
document.getElementById('searchInput').addEventListener('input', debounce(loadDocuments, 300));
document.getElementById('typeFilter').addEventListener('change', loadDocuments);
document.getElementById('statusFilter').addEventListener('change', loadDocuments);

// 防抖函数
function debounce(func, wait) {
    let timeout;
    return function(...args) {
        clearTimeout(timeout);
        timeout = setTimeout(() => func.apply(this, args), wait);
    };
}

// 重置筛选条件
function resetFilters() {
    document.getElementById('searchInput').value = '';
    document.getElementById('typeFilter').value = '';
    document.getElementById('statusFilter').value = '';
    loadDocuments();
}
</script>
{% endblock %}
